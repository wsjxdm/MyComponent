name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Linting
  lint:
    name: Run Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

  # Job 2: Build
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      # 上传构建产物 (Artifact) 供部署 Job 使用
      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist/
          retention-days: 1

  # Job 3: Deploy (Depends on lint and build)
  deploy:
    name: Deploy Application
    needs: [lint, build] # 依然保持对 lint 和 build 的依赖
    runs-on: ubuntu-latest
    steps:
      # 下载构建产物 (Artifact)
      - name: Download Build Output
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: dist/

      - name: Deploy Simulation
        run: |
          echo "Deploying application from build artifact..."
          ls -R dist/
          echo "Application deployed successfully!"
