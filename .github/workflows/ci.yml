name: CI/CD Pipeline and GitHub Pages Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 允许手动触发
  workflow_dispatch:

# 设置权限以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 限制并发部署，确保只有一个正在运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Linting
  lint:
    name: Run Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

  # Job 2: Build and Upload Pages Artifact
  build:
    name: Build Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Website
        run: npm run build:site

      # 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 上传构建好的静态文件作为 Pages 产物
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site/

  # Job 3: Deploy to GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    # 只有在 main 分支推送时且 lint/build 成功后才部署
    if: github.ref == 'refs/heads/main'
    needs: [lint, build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
